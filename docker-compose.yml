services:
  mega-agent:
    build: .
    container_name: mega-agent
    ports:
      - '8080:8080'
      - '11434:11434'
    runtime: nvidia
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ENDPOINT=http://localhost:11434
      - MODEL_NAME=mws-agent:latest
      - DB_CONN_STRING=postgres://postgres:postgres@postgres:5432/mega_agent?sslmode=disable
      - SESSION_ID=default-session
      - SERVER_PORT=:8080
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ollama_models:/root/.ollama
      - ./ml/ollama:/app/ollama:ro
    restart: unless-stopped

  frontend:
    image: python:3.11-alpine
    container_name: mega-agent-frontend
    ports:
      - '80:8000'
    command: python -m http.server 8000
    working_dir: /app
    volumes:
      - ./frontend:/app
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mega-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mega_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_models:
  postgres_data:
