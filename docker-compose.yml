services:
  ollama: # ← ДОБАВИТЬ ЭТОТ СЕРВИС
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    # healthcheck для ожидания готовности
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 10s
      timeout: 5s
      retries: 10

  mega-agent:
    build: .
    container_name: mega-agent
    ports:
      - '8080:8080'
      # - '11434:11434'  # ← УБРАТЬ (ollama уже пробрасывает свой порт)
    environment:
      - OLLAMA_HOST=ollama # ← ИЗМЕНИТЬ: теперь это имя сервиса
      - OLLAMA_ENDPOINT=http://ollama:11434 # ← ИЗМЕНИТЬ
      - MODEL_NAME=mws-agent:latest
      - DB_CONN_STRING=postgres://postgres:postgres@postgres:5432/mega_agent?sslmode=disable
      - SESSION_ID=default-session
      - SERVER_PORT=:8080
    depends_on:
      postgres:
        condition: service_started
      ollama: # ← ДОБАВИТЬ зависимость
        condition: service_healthy
    volumes:
      - ./ml/ollama:/app/ollama:ro
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mega-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mega_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_models:
  postgres_data:
