version: '3.8'

services:
  ollama:
    build:
      context: ./ml/ollama
      dockerfile: Dockerfile
    container_name: ollama
    volumes:
      - ollama_models:/root/.ollama
      - type: bind
        source: ./ml/ollama
        target: /app/ollama
        read_only: true
      - type: bind
        source: ./ml/ollama/logs
        target: /var/log
        read_only: false
    environment:
        - OLLAMA_KEEP_ALIVE=24h
        - OLLAMA_HOST=0.0.0.0
        - OLLAMA_NUM_PARALLEL=1
        - OLLAMA_MAX_LOADED_MODELS=1
        - OLLAMA_NO_UPGRADE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  ollama_models:

networks:
  agent-network:
    driver: bridge
    # internal: true  # Необходимо будет раскоментировать при финальной сдачи закроет формальный пункт данные не покидают контур.